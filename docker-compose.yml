services:
  postgres:
    image: postgres:16-alpine
    container_name: shujietai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shujietai}
      POSTGRES_USER: ${POSTGRES_USER:-shujietai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shujietai_dev}
    volumes:
      - shujietai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shujietai} -d ${POSTGRES_DB:-shujietai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shujietai-redis
    volumes:
      - shujietai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shujietai-backend
    working_dir: /app
    env_file:
      - .env
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:15173}
      WORKSPACE_TOKEN: ${WORKSPACE_TOKEN:-dev-workspace-token}
      PYTHONPATH: /app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shujietai-frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  shujietai_postgres_data:
  shujietai_redis_data:
