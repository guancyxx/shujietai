services:
  postgres:
    image: postgres:16-alpine
    container_name: shujietai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shujietai}
      POSTGRES_USER: ${POSTGRES_USER:-shujietai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shujietai_dev}
    volumes:
      - shujietai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shujietai} -d ${POSTGRES_DB:-shujietai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shujietai-redis
    restart: unless-stopped
    volumes:
      - shujietai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shujietai-backend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      SESSION_STORE_BACKEND: ${SESSION_STORE_BACKEND:-sqlalchemy}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-shujietai}:${POSTGRES_PASSWORD:-shujietai_dev}@postgres:5432/${POSTGRES_DB:-shujietai}}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      CORS_ORIGINS: http://localhost:15173,http://127.0.0.1:15173
      WORKSPACE_TOKEN: ${WORKSPACE_TOKEN:-dev-workspace-token}
      PYTHONPATH: /app
      HOME: /home/guancy
      HERMES_API_BASE_URL: ${HERMES_API_BASE_URL:-http://host-gateway.internal:8643/v1}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_MODEL: ${HERMES_MODEL:-gpt-5.3-codex}
      HERMES_API_TIMEOUT_SECONDS: ${HERMES_API_TIMEOUT_SECONDS:-120}
      HERMES_CLI_FALLBACK_ENABLED: ${HERMES_CLI_FALLBACK_ENABLED:-1}
      HERMES_BIN: ${HERMES_BIN:-/usr/local/bin/hermes}
      INGEST_RETRY_ENABLED: ${INGEST_RETRY_ENABLED:-true}
      INGEST_MAX_RETRIES: ${INGEST_MAX_RETRIES:-3}
      INGEST_RETRY_DELAYS: ${INGEST_RETRY_DELAYS:-1,3,10}
      INGEST_RETRY_LOOP_INTERVAL_SECONDS: ${INGEST_RETRY_LOOP_INTERVAL_SECONDS:-1}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ${HERMES_CLI_PATH:-/home/guancy/.local/bin/hermes}:/usr/local/bin/hermes:ro
      - ${HERMES_AGENT_ROOT:-/home/guancy/.hermes/hermes-agent}:/home/guancy/.hermes/hermes-agent:ro
      - ${HERMES_HOME_DIR:-/home/guancy/.hermes}:/home/guancy/.hermes
      - ${HERMES_HOME_DIR:-/home/guancy/.hermes}:/root/.hermes
      - ${HERMES_UV_ROOT:-/home/guancy/.local/share/uv}:/home/guancy/.local/share/uv:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "host-gateway.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shujietai-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  shujietai_postgres_data:
  shujietai_redis_data:
