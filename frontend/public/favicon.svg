<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#36D1FF"/>
      <stop offset="35%" stop-color="#7A8CFF"/>
      <stop offset="70%" stop-color="#C27CFF"/>
      <stop offset="100%" stop-color="#FF8AA1"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <circle cx="100" cy="100" r="68" stroke="url(#ring)" stroke-width="12"/>
    <circle cx="100" cy="100" r="42" stroke="#D2DCFF" stroke-opacity="0.62" stroke-width="3" stroke-dasharray="7 6"/>
    <circle cx="100" cy="100" r="18" fill="#D7E0FF"/>
    <circle cx="100" cy="32" r="8" fill="#35D9FF"/>
    <circle cx="163" cy="70" r="8" fill="#7B8DFF"/>
    <circle cx="163" cy="130" r="8" fill="#BB7EFF"/>
    <circle cx="100" cy="168" r="8" fill="#FF8AA3"/>
    <circle cx="37" cy="130" r="8" fill="#FFB36E"/>
    <circle cx="37" cy="70" r="8" fill="#62E6CA"/>
  </g>
</svg>
